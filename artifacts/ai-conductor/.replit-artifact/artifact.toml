kind = "web"
previewPath = "/"
title = "AI Conductor"
version = "1.0.0"
id = "artifacts/ai-conductor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20434
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ai-conductor run dev"

[services.env]
PORT = "20434"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ai-conductor", "run", "build"]
publicDir = "artifacts/ai-conductor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
